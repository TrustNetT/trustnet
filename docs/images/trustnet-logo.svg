<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <style>
      .trustnet-fingerprint { fill: #0891B2; }
      .trustnet-circle-1 { fill: #EF4444; }
      .trustnet-circle-2 { fill: #FBBF24; }
      .trustnet-circle-3 { fill: #0891B2; }
      .trustnet-circle-4 { fill: #EC4899; }
      .trustnet-circle-5 { fill: #6366F1; }
      .trustnet-circle-6 { fill: #F59E0B; }
    </style>
  </defs>

  <!-- Fingerprint Icon (center) -->
  <g class="trustnet-fingerprint">
    <!-- Top curved line -->
    <path d="M 85 80 Q 128 60 160 85" stroke="#0891B2" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Upper middle curved line -->
    <path d="M 75 115 Q 128 90 175 115" stroke="#0891B2" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Middle curved line -->
    <path d="M 70 150 Q 128 120 180 150" stroke="#0891B2" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Lower middle curved line -->
    <path d="M 80 180 Q 128 155 170 180" stroke="#0891B2" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Bottom short lines -->
    <path d="M 100 200 Q 128 185 145 200" stroke="#0891B2" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative circles around the fingerprint -->
  <!-- Red circle - top right -->
  <circle cx="188" cy="60" r="20" class="trustnet-circle-1"/>
  
  <!-- Yellow circle - right -->
  <circle cx="210" cy="140" r="22" class="trustnet-circle-2"/>
  
  <!-- Blue circle - bottom right -->
  <circle cx="180" cy="205" r="18" class="trustnet-circle-3"/>
  
  <!-- Blue circle - left bottom -->
  <circle cx="55" cy="190" r="20" class="trustnet-circle-3"/>
  
  <!-- Pink circle - left middle -->
  <circle cx="45" cy="130" r="19" class="trustnet-circle-4"/>
  
  <!-- Outer circle outline (representing network/connectivity) -->
  <circle cx="128" cy="128" r="115" stroke="#0891B2" stroke-width="8" fill="none" stroke-opacity="0.3"/>

  <!-- Connecting lines (subtle) -->
  <line x1="128" y1="128" x2="188" y2="60" stroke="#0891B2" stroke-width="2" opacity="0.2"/>
  <line x1="128" y1="128" x2="210" y2="140" stroke="#0891B2" stroke-width="2" opacity="0.2"/>
  <line x1="128" y1="128" x2="180" y2="205" stroke="#0891B2" stroke-width="2" opacity="0.2"/>
  <line x1="128" y1="128" x2="55" y2="190" stroke="#0891B2" stroke-width="2" opacity="0.2"/>
</svg>
