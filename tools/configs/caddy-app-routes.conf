# TrustNet v1.1.0 Reverse Proxy Configuration
# Caddy configuration for routing blockchain, API, and static content
# Include this in main Caddyfile: import /etc/caddy/conf.d/app.conf
# 
# Route priority (first matching wins):
# 1. /api/* → FastAPI server (8001)
# 2. /setup* → Static HTML UI
# 3. /.well-known/* → Acme/cert validation
# 4. /* → Static files or blockchain (6060)

# Trust real IP from reverse proxy
trusted_proxies static 127.0.0.1

# Compression
encode zstd gzip

# Security headers
header * {
    X-Content-Type-Options "nosniff"
    X-Frame-Options "SAMEORIGIN"
    X-XSS-Protection "1; mode=block"
}

# Route: API Endpoints (v1.1.0)
# POST /api/generate → QR code generation
# GET /api/health → Health check
# GET /api/status → Setup status
@api {
    path /api/*
}

reverse_proxy @api localhost:8001 {
    # Pass original request info
    header_upstream Host {http.request.host}
    header_upstream X-Real-IP {http.request.remote}
    header_upstream X-Forwarded-For {http.request.remote}
    header_upstream X-Forwarded-Proto {http.request.scheme}
    
    # Timeout settings
    transport http {
        dial_timeout 5s
        response_header_timeout 10s
    }
}

# Route: Setup UI (v1.1.0)
# Serves first-setup.html for iOS app configuration
@setup {
    path /setup
    path /setup/*
}

handle @setup {
    file_server {
        root /opt/trustnet/web
        index first-setup.html
    }
}

# Route: Blockchain Status (v1.0.0)
# Tendermint RPC endpoints
@blockchain {
    path /blockchain/*
    path /tendermint/*
}

reverse_proxy @blockchain localhost:6060 {
    header_upstream Host {http.request.host}
    header_upstream X-Forwarded-For {http.request.remote}
    header_upstream X-Forwarded-Proto {http.request.scheme}
}

# Route: Static Content (Dashboard)
# Serves index.html and dashboard assets
handle / {
    file_server {
        root /var/www/trustnet
        index index.html
    }
}

# Catch-all for dynamic blockchain requests
@api_fallback {
    path /health
    path /status
}

reverse_proxy @api_fallback localhost:6060 {
    header_upstream X-Forwarded-For {http.request.remote}
    header_upstream X-Forwarded-Proto {http.request.scheme}
}
